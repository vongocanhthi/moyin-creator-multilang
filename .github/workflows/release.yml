name: Release (Windows + macOS)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
          # macOS (build x64 on Apple Silicon runner)
          - name: macos-x64
            os: macos-14
          # macOS Apple Silicon (arm64)
          - name: macos-arm64
            os: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure npm registry (avoid mirror timeouts)
        shell: bash
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 300000

      - name: Install dependencies
        run: npm ci --prefer-online

      - name: Build desktop artifacts (Windows)
        if: runner.os == 'Windows'
        run: npm run build:win

      - name: Build desktop artifacts (macOS x64)
        if: matrix.name == 'macos-x64'
        run: npm run build:mac:x64

      - name: Build desktop artifacts (macOS arm64)
        if: matrix.name == 'macos-arm64'
        run: npm run build:mac:arm64

      - name: Upload build directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build-${{ matrix.name }}
          path: release/build/**

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout (for version)
        uses: actions/checkout@v4

      - name: Setup Node (for version parsing)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Export app version env
        shell: bash
        run: |
          APP_VERSION="$(node -p 'require(\"./package.json\").version')"
          APP_NAME="$(node -p 'require(\"./package.json\").name')"
          {
            echo "APP_VERSION=${APP_VERSION}"
            echo "APP_NAME=${APP_NAME}"
            echo "RELEASE_NAME=V${APP_VERSION}-multilang"
          } >> "$GITHUB_ENV"

      - name: Prepare release assets (rename)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          VERSION="${APP_VERSION}"
          APP_NAME="${APP_NAME}"

          # Windows NSIS installer
          win_setup="$(ls -1 dist/**/**/*setup*.exe 2>/dev/null | head -n 1 || true)"
          if [[ -z "${win_setup}" ]]; then
            echo "Missing Windows setup exe" >&2
            exit 1
          fi
          cp -f "${win_setup}" "release-assets/${APP_NAME}-${VERSION}-setup.exe"

          # macOS DMG (x64 + arm64)
          mac_dmg_x64="$(ls -1 dist/**/**/*x64*mac.dmg 2>/dev/null | head -n 1 || true)"
          if [[ -z "${mac_dmg_x64}" ]]; then
            echo "Missing macOS x64 dmg" >&2
            exit 1
          fi
          cp -f "${mac_dmg_x64}" "release-assets/${APP_NAME}-${VERSION}.dmg"

          mac_dmg_arm64="$(ls -1 dist/**/**/*arm64*mac.dmg 2>/dev/null | head -n 1 || true)"
          if [[ -z "${mac_dmg_arm64}" ]]; then
            echo "Missing macOS arm64 dmg" >&2
            exit 1
          fi
          cp -f "${mac_dmg_arm64}" "release-assets/${APP_NAME}-${VERSION}-arm64.dmg"

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          name: ${{ env.RELEASE_NAME }}
          body: |
            ## Release notes
            - Multilang build for Moyin Creator.
            - Supports multilingual UI (VI/EN/ZH).
          files: |
            release-assets/*.exe
            release-assets/*.dmg

